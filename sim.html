<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniFly 手機模擬器 - Nakamura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: none; /* 防止畫面滾動與縮放 */
        }
        
        /* 上半部：3D 畫布區域 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 50vh;
            z-index: 1;
            background-color: #87CEEB;
        }

        /* 下半部：操控介面 */
        #bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 50vh;
            background: #000;
            z-index: 5;
            display: block; /* 改為預設顯示 */
        }

        /* 載入畫面 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f8fafc;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        /* 遙測數據區 (放大為原先2倍) */
        #telemetry-overlay {
            position: absolute;
            top: 6px; 
            left: 6px; 
            z-index: 25;
            pointer-events: none;
            display: flex; /* 改為預設顯示 */
            flex-direction: column;
            gap: 2px; 
        }

        .telemetry-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 4px 8px; 
            border-radius: 3.2px; 
            font-size: 12px; 
            font-family: monospace;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px; 
            min-width: 100px; 
            border: 0.2px solid rgba(255, 255, 255, 0.1);
        }

        /* 起飛提示 (放大為原先2倍) */
        #launch-hint {
            position: absolute;
            top: 16px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            display: block; /* 改為預設顯示 */
            text-shadow: 0 0.4px 0.8px rgba(0,0,0,0.5); /* 陰影 */
            padding: 3.2px 9.6px; 
            font-size: 7.2px; 
        }

        /* ================= 油門控制點專屬樣式 ================= */
        .track-line {
            position: absolute;
            width: 2px; 
            background: #444;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0.8px; 
            z-index: 10;
        }
        
        #throttle-dot {
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0);
            z-index: 15;
            touch-action: none;
            transition: background-color 0.3s ease;
            width: 144px; /* 從 72px 放大為 144px */
            height: 144px; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6); 
        }

        .dot-red { background-color: #dc2626 !important; }
        .dot-green { background-color: #22c55e !important; }

        #throttle-text {
            position: absolute;
            top: -32px; 
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            font-size: 16.8px; 
            pointer-events: none;
            letter-spacing: 0.8px; 
            z-index: 20;
            white-space: nowrap;
        }

        .svg-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .ring-bg {
            stroke: #333;
            stroke-width: 8; 
            fill: none;
        }

        .ring-fg {
            stroke-width: 8;
            fill: none;
            transition: stroke-dashoffset 0.1s linear;
            stroke-linecap: round;
        }
    </style>
</head>
<body>

    <!-- 載入過場畫面 -->
    <div id="loading-overlay">
        <h1 class="text-5xl font-black text-slate-800 tracking-tight mb-4 animate-bounce">MiniFly</h1>
        <div class="text-xl font-bold text-blue-600 animate-pulse">正在載入室外場景與 Nakamura 機型...</div>
    </div>

    <!-- 3D 飛行場景 -->
    <div id="canvas-container">
        <div id="telemetry-overlay">
            <div class="telemetry-bubble"><span class="text-gray-400">DIST</span><span id="stat-dist" class="ml-auto">0.0 m</span></div>
            <div class="telemetry-bubble"><span class="text-gray-400">ALT </span><span id="stat-height" class="ml-auto">0.0 m</span></div>
            <div class="telemetry-bubble"><span class="text-gray-400">SPD </span><span id="stat-speed" class="ml-auto">0.0 km/h</span></div>
        </div>
        <div id="launch-hint" class="bg-black/60 backdrop-blur-sm text-white rounded-full font-bold animate-bounce">
            推滿油門三秒後自動起飛
        </div>
    </div>

    <!-- 下半部操控介面 -->
    <div id="bottom-controls">
        <div id="throttle-track" class="track-line"></div>
        <div id="throttle-dot" class="dot-red">
            <svg class="svg-ring" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" class="ring-bg" />
                <circle id="progress-ring" cx="50" cy="50" r="45" class="ring-fg" stroke="#4CAF50" stroke-dasharray="283" stroke-dashoffset="283" />
            </svg>
            <span id="throttle-text">unlock</span>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- 全域狀態 ---
        let activeScene = 'outdoor';
        let airplane = null, modelContainer = null, leftPropeller = null, rightPropeller = null;
        let isLaunched = false, launchTimer = 0, isCrashed = false, crashTimer = 0;
        let currentSpeed = 0;
        const clock = new THREE.Clock();

        const UNIT_TO_METERS = 0.054; 
        const INITIAL_Y = 1.8 / UNIT_TO_METERS; 
        const GYM_SIZE = 1200;
        const GYM_HEIGHT = 400;

        // --- 操控邏輯狀態 ---
        let throttleValue = 0; // 0.0 ~ 1.0
        let rudderValue = 0;   // -1.0 ~ 1.0
        let unlocked = false;
        let currentRoll = 0;
        let rudderBaseRoll = 0;

        // --- 音效狀態 ---
        let audioCtx = null, lGain, rGain, lOsc, rOsc;
        function initAudio() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return;
            }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const setupMotor = () => {
                const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
                const gain = audioCtx.createGain(); gain.gain.value = 0;
                const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); return { osc, gain };
            };
            const l = setupMotor(); lOsc = l.osc; lGain = l.gain;
            const r = setupMotor(); rOsc = r.osc; rGain = r.gain;

            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // --- UI 元件 ---
        const bottomControls = document.getElementById('bottom-controls');
        const throttleDot = document.getElementById('throttle-dot');
        const progressRing = document.getElementById('progress-ring');
        const throttleText = document.getElementById('throttle-text');
        const CIRCUMFERENCE = 283; // 2 * pi * 45

        // --- Three.js 初始化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.00015);

        const getCanvasHeight = () => window.innerHeight * 0.5;
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / getCanvasHeight(), 0.1, 15000);
        const statusCamera = new THREE.PerspectiveCamera(60, 4 / 3, 0.1, 5000); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, getCanvasHeight());
        renderer.shadowMap.enabled = true;
        renderer.autoClear = false; 
        renderer.outputEncoding = THREE.sRGBEncoding; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        container.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(500, 1000, 200);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 場景建立 ---
        const outdoorGroup = new THREE.Group(); scene.add(outdoorGroup);
        const gymGroup = new THREE.Group(); scene.add(gymGroup);

        function createTerrainTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const greens = ['#4F7942', '#556B2F', '#6B8E23'];
            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    ctx.fillStyle = greens[Math.floor(Math.random()*3)];
                    ctx.fillRect(i*64, j*64, 64, 64);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(32, 32);
            return tex;
        }

        function getTerrainHeight(x, z) {
            if (activeScene === 'gym') return 0;
            const dist = Math.sqrt(x*x + z*z);
            if (dist <= 150) return 0; 
            return ((Math.sin(x/400) + Math.cos(z/400)) * 15) * Math.min(1, (dist-150)/200);
        }

        const groundGeo = new THREE.PlaneGeometry(12000, 12000, 40, 40);
        groundGeo.rotateX(-Math.PI / 2);
        const groundPos = groundGeo.attributes.position;
        for (let i = 0; i < groundPos.count; i++) { groundPos.setY(i, getTerrainHeight(groundPos.getX(i), groundPos.getZ(i))); }
        groundGeo.computeVertexNormals();
        outdoorGroup.add(new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ map: createTerrainTexture() })));

        // --- 處理模型載入 ---
        function processModel(url, filename) {
            new THREE.GLTFLoader().load(url, (gltf) => {
                if (airplane) scene.remove(airplane);
                const model = gltf.scene;
                airplane = new THREE.Group(); modelContainer = new THREE.Group();
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                const scale = 10 / size;
                model.scale.set(scale, scale, scale);
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                modelContainer.add(model);
                
                const propGeo = new THREE.BoxGeometry(1.5, 0.1, 0.05);
                leftPropeller = new THREE.Mesh(propGeo, new THREE.MeshBasicMaterial({ color: 0x222222 }));
                rightPropeller = new THREE.Mesh(propGeo, new THREE.MeshBasicMaterial({ color: 0x222222 }));
                
                let propZ = 4.25, propY = 0.5;
                const lowName = filename.toLowerCase();
                if (lowName.includes('invader')) propZ = 3.7;
                else if (lowName.includes('3d_f-14')) { propZ = 3.7; propY = -0.25; }
                else if (lowName.startsWith('3d_')) { propZ = 4.0; propY = -0.25; } 
                else if (lowName.includes('aerobat')) { propY = 0.3 }
                
                leftPropeller.position.set(-0.8, propY, propZ);
                rightPropeller.position.set(0.8, propY, propZ);
                
                modelContainer.add(leftPropeller, rightPropeller);
                airplane.add(modelContainer);
                airplane.position.set(0, INITIAL_Y, -10);
                scene.add(airplane);
                camera.position.set(0, INITIAL_Y, 0);
                
                // 隱藏載入畫面
                const loaderOverlay = document.getElementById('loading-overlay');
                if (loaderOverlay) {
                    loaderOverlay.style.opacity = '0';
                    setTimeout(() => loaderOverlay.style.display = 'none', 500);
                }

                calculateDragRange();
                updateControlUI();
            });
        }

        // --- 處理方向感測器邏輯 ---
        function handleOrientation(event) {
            if (event.gamma === null) return;
            currentRoll = event.gamma;

            if (unlocked) {
                let delta = currentRoll - rudderBaseRoll;
                let adjusted = 0;
                if (Math.abs(delta) > 5) {
                    adjusted = delta > 0 ? delta - 5 : delta + 5;
                }
                rudderValue = Math.max(-1, Math.min(1, adjusted / 35.0));
            } else {
                rudderValue = 0;
            }
        }

        let sensorInitialized = false;
        function setupOrientationSensor() {
            if (sensorInitialized) return;
            sensorInitialized = true;
            
            initAudio(); // 啟動音效環境
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                }).catch(console.error);
            } else if ('DeviceOrientationEvent' in window) {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }
        
        document.body.addEventListener('touchstart', setupOrientationSensor, { once: true });
        document.body.addEventListener('click', setupOrientationSensor, { once: true });


        // --- 油門控制邏輯 ---
        let isDragging = false;
        let unlockStartTime = 0;
        let unlockReqId = null;
        let dropTimeout = null;
        let lockTimeout = null;
        let dropReqId = null;
        
        let startTouchY = 0;
        let startDotY = 0;
        let dotY = 0; 
        let maxDragY = 30; // 更新預設值

        function calculateDragRange() {
            const rect = bottomControls.getBoundingClientRect();
            
            // 所有數學數值跟著等比例放大 (x2)
            const trackTop = 48; // 原 24 * 2
            const originalLength = rect.height - trackTop - 52; // 原 26 * 2
            maxDragY = Math.max(20, originalLength / 2); // 原 10 * 2
            
            const track = document.getElementById('throttle-track');
            track.style.top = trackTop + 'px';
            track.style.height = maxDragY + 'px';
            track.style.bottom = 'auto';
            
            // 144px 圓的一半為 72px
            const dotBaseTop = trackTop + maxDragY - 72; 
            throttleDot.style.top = dotBaseTop + 'px';
            throttleDot.style.bottom = 'auto'; 
        }

        function updateControlUI() {
            throttleDot.style.transform = `translate(-50%, ${-dotY}px)`;

            if (!unlocked) {
                throttleDot.classList.remove('dot-green');
                throttleDot.classList.add('dot-red');
                throttleText.innerText = 'unlock';
                progressRing.setAttribute('stroke', '#4CAF50');
            } else {
                throttleDot.classList.remove('dot-red');
                throttleDot.classList.add('dot-green');
                let percent = Math.round(throttleValue * 100);
                throttleText.innerText = percent + '%';
                progressRing.setAttribute('stroke', '#2196F3');
                progressRing.style.strokeDashoffset = CIRCUMFERENCE - (CIRCUMFERENCE * throttleValue);
            }
        }

        throttleDot.addEventListener('touchstart', (e) => {
            e.preventDefault();
            setupOrientationSensor(); 
            initAudio(); 
            
            if (!unlocked) {
                unlockStartTime = Date.now();
                const animateUnlock = () => {
                    let progress = (Date.now() - unlockStartTime) / 500; 
                    if (progress >= 1.0) {
                        unlocked = true;
                        throttleValue = 0;
                        rudderBaseRoll = currentRoll; 
                        progressRing.style.strokeDashoffset = CIRCUMFERENCE;
                        updateControlUI();
                        startLockTimer();
                        return;
                    }
                    progressRing.style.strokeDashoffset = CIRCUMFERENCE - (CIRCUMFERENCE * progress);
                    unlockReqId = requestAnimationFrame(animateUnlock);
                };
                unlockReqId = requestAnimationFrame(animateUnlock);
            } else {
                isDragging = true;
                clearTimeout(dropTimeout);
                clearTimeout(lockTimeout);
                cancelAnimationFrame(dropReqId);
                startTouchY = e.touches[0].clientY;
                startDotY = dotY;
            }
        }, {passive: false});

        throttleDot.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (unlocked && isDragging) {
                let deltaY = startTouchY - e.touches[0].clientY; 
                dotY = Math.max(0, Math.min(maxDragY, startDotY + deltaY));
                throttleValue = dotY / maxDragY;
                updateControlUI();
            }
        }, {passive: false});

        throttleDot.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!unlocked) {
                cancelAnimationFrame(unlockReqId);
                progressRing.style.strokeDashoffset = CIRCUMFERENCE;
            } else {
                isDragging = false;
                startDropTimer();
                if (throttleValue <= 0.01) {
                    startLockTimer();
                }
            }
        });

        function startDropTimer() {
            clearTimeout(dropTimeout);
            dropTimeout = setTimeout(() => {
                const animateDrop = () => {
                    if (isDragging || !unlocked) return;
                    dotY -= maxDragY * 0.05; 
                    if (dotY <= 0) {
                        dotY = 0;
                        throttleValue = 0;
                        updateControlUI();
                        startLockTimer();
                    } else {
                        throttleValue = dotY / maxDragY;
                        updateControlUI();
                        dropReqId = requestAnimationFrame(animateDrop);
                    }
                };
                dropReqId = requestAnimationFrame(animateDrop);
            }, 2000);
        }

        function startLockTimer() {
            clearTimeout(lockTimeout);
            lockTimeout = setTimeout(() => {
                if (!isDragging && throttleValue <= 0.01 && unlocked) {
                    unlocked = false;
                    throttleValue = 0;
                    dotY = 0;
                    rudderValue = 0;
                    progressRing.style.strokeDashoffset = CIRCUMFERENCE;
                    updateControlUI();
                }
            }, 5000);
        }

        // --- 渲染循環與初始化 ---
        function animate() {
            requestAnimationFrame(animate);
            let dt = Math.min(clock.getDelta(), 0.1); 
            const timeScale = dt * 60; 

            if (airplane && modelContainer) {
                if (isCrashed) {
                    crashTimer += dt;
                    if (crashTimer >= 2.0) {
                        isCrashed = false; crashTimer = 0; isLaunched = false; currentSpeed = 0;
                        airplane.position.set(0, INITIAL_Y, -10); airplane.rotation.set(0,0,0); modelContainer.rotation.set(0,0,0);
                        document.getElementById('launch-hint').style.display = 'block';
                    }
                } else {
                    airplane.rotation.y -= rudderValue * (0.04 * throttleValue) * timeScale;
                    modelContainer.rotation.z += (-rudderValue * 0.4 * throttleValue - modelContainer.rotation.z) * Math.min(1, 0.1 * timeScale);
                    modelContainer.rotation.x += (((throttleValue-0.7)*1.5 - Math.abs(modelContainer.rotation.z)*0.6) - modelContainer.rotation.x) * Math.min(1, 0.1 * timeScale);

                    const ls = Math.max(0, throttleValue + rudderValue*0.25*throttleValue);
                    const rs = Math.max(0, throttleValue - rudderValue*0.25*throttleValue);
                    leftPropeller.rotation.z += ls * 1.2 * timeScale; 
                    rightPropeller.rotation.z -= rs * 1.2 * timeScale;

                    if (audioCtx) {
                        const att = 50 / (50 + airplane.position.distanceTo(camera.position));
                        lGain.gain.setTargetAtTime((ls>0.05?ls*0.15:0)*att, audioCtx.currentTime, 0.1);
                        rGain.gain.setTargetAtTime((rs>0.05?rs*0.15:0)*att, audioCtx.currentTime, 0.1);
                        lOsc.frequency.setTargetAtTime(100+ls*300, audioCtx.currentTime, 0.1);
                        rOsc.frequency.setTargetAtTime(100+rs*300, audioCtx.currentTime, 0.1);
                    }

                    if (ls > rs + 0.01) {
                        leftPropeller.material.color.setHex(0xff0000);
                        rightPropeller.material.color.setHex(0x222222);
                    } else if (rs > ls + 0.01) {
                        leftPropeller.material.color.setHex(0x222222);
                        rightPropeller.material.color.setHex(0xff0000);
                    } else {
                        leftPropeller.material.color.setHex(0x222222);
                        rightPropeller.material.color.setHex(0x222222);
                    }

                    if (!isLaunched) {
                        if (throttleValue > 0.9) { 
                            launchTimer += dt; 
                            if(launchTimer > 3) { 
                                isLaunched = true; 
                                document.getElementById('launch-hint').style.display='none'; 
                            }
                        } else launchTimer = 0;
                    } else {
                        currentSpeed += (0.53 + throttleValue - currentSpeed) * dt * 1.5;
                        airplane.translateZ(-currentSpeed * Math.cos(modelContainer.rotation.x) * timeScale);
                        airplane.position.y += currentSpeed * Math.sin(modelContainer.rotation.x) * timeScale;
                    }

                    let collided = false;
                    const h = getTerrainHeight(airplane.position.x, airplane.position.z);
                    if (airplane.position.y < h + 0.5) collided = true; 
                    if (collided && isLaunched) isCrashed = true;
                    if (collided) airplane.position.y = Math.max(airplane.position.y, h + 0.5);
                }

                const dist = airplane.position.distanceTo(new THREE.Vector3(0, INITIAL_Y, 0)) * UNIT_TO_METERS;
                const alt = (airplane.position.y - getTerrainHeight(airplane.position.x, airplane.position.z)) * UNIT_TO_METERS;
                const spd = currentSpeed * 60 * UNIT_TO_METERS * 3.6;
                document.getElementById('stat-dist').innerText = (dist*3).toFixed(1) + ' m';
                document.getElementById('stat-height').innerText = (alt*3).toFixed(1) + ' m';
                document.getElementById('stat-speed').innerText = spd.toFixed(1) + ' km/h';

                camera.lookAt(airplane.position);
                let d = new THREE.Vector3().subVectors(airplane.position, camera.position).normalize();
                statusCamera.position.copy(airplane.position).sub(d.multiplyScalar(20));
                statusCamera.position.y += 2; statusCamera.lookAt(airplane.position);
            }
            
            const cw = window.innerWidth, ch = getCanvasHeight();
            renderer.setViewport(0, 0, cw, ch); 
            renderer.setScissor(0, 0, cw, ch);
            renderer.setScissorTest(true); 
            renderer.clear(); 
            renderer.render(scene, camera);
            
            if (airplane) {
                // 將子母畫面小視窗寬高縮小為 1/2
                const w = Math.max(cw * 0.2, 120), h = w * 0.75; 
                const x = cw - w - 15, y = ch - h - 15;
                renderer.setViewport(x, y, w, h); 
                renderer.setScissor(x, y, w, h); 
                renderer.clearDepth(); 
                renderer.render(scene, statusCamera);
            }
        }

        window.addEventListener('resize', () => { 
            const ch = getCanvasHeight();
            camera.aspect = window.innerWidth / ch; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, ch); 
            if (bottomControls.style.display !== 'none') {
                calculateDragRange();
                if (unlocked && !isDragging) {
                    dotY = throttleValue * maxDragY;
                    updateControlUI();
                }
            }
        });

        // 系統啟動
        outdoorGroup.visible = true;
        gymGroup.visible = false;
        processModel('https://raw.githubusercontent.com/kuoyichen/minifly/main/nakamura.glb', 'Nakamura');
        animate();
    </script>
